<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soham's Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #7c3aed;
    --accent2: #a78bfa;
    --accent-glow: rgba(124, 58, 237, 0.15);
    --study: #22c55e;
    --gaming: #f59e0b;
    --coaching: #3b82f6;
    --misc: #ec4899;
    --sleep: #6366f1;
    --reading: #14b8a6;
    --tuition: #f97316;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --text-dim: #334155;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(124, 58, 237, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(99, 102, 241, 0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    margin-bottom: 48px;
    text-align: center;
  }

  .header-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent2);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .header h1 {
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.1;
    background: linear-gradient(135deg, #e2e8f0 0%, #a78bfa 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .header-sub {
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 400;
  }

  /* Day tabs */
  .tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 32px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .tab {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.01em;
  }

  .tab:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .tab.active {
    background: var(--accent-glow);
    border-color: var(--accent);
    color: var(--accent2);
  }

  .tab.weekend {
    border-color: #1e2a1e;
  }

  .tab.weekend.active {
    background: rgba(34, 197, 94, 0.08);
    border-color: var(--study);
    color: var(--study);
  }

  /* Stats bar */
  .stats {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .stat {
    flex: 1;
    min-width: 100px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    text-align: center;
  }

  .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* Schedule */
  .schedule {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .block {
    display: flex;
    align-items: stretch;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--surface);
    transition: transform 0.15s ease, border-color 0.15s ease;
    cursor: default;
  }

  .block:hover {
    transform: translateX(4px);
    border-color: #2d2d42;
  }

  .block-accent {
    width: 3px;
    flex-shrink: 0;
  }

  .block-content {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 18px;
    flex: 1;
  }

  .block-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
    min-width: 110px;
  }

  .block-icon {
    font-size: 18px;
    flex-shrink: 0;
  }

  .block-info {
    flex: 1;
  }

  .block-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
  }

  .block-desc {
    font-size: 12px;
    color: var(--text-muted);
  }

  .block-duration {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
  }

  /* Category colors */
  .cat-sleep .block-accent { background: var(--sleep); }
  .cat-sleep .block-title { color: #a5b4fc; }

  .cat-routine .block-accent { background: #334155; }

  .cat-coaching .block-accent { background: var(--coaching); }
  .cat-coaching .block-title { color: #93c5fd; }

  .cat-study .block-accent { background: var(--study); }
  .cat-study .block-title { color: #86efac; }

  .cat-gaming .block-accent { background: var(--gaming); }
  .cat-gaming .block-title { color: #fcd34d; }

  .cat-workout .block-accent { background: var(--misc); }
  .cat-workout .block-title { color: #f9a8d4; }

  .cat-reading .block-accent { background: var(--reading); }
  .cat-reading .block-title { color: #5eead4; }

  .cat-tuition .block-accent { background: var(--tuition); }
  .cat-tuition .block-title { color: #fdba74; }

  .cat-food .block-accent { background: #854d0e; }
  .cat-food .block-title { color: #ca8a04; }

  .cat-misc .block-accent { background: #334155; }
  .cat-misc .block-title { color: #94a3b8; }

  /* Legend */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  /* Progress ring */
  .day-progress {
    text-align: center;
    margin-bottom: 24px;
  }

  .progress-label {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 8px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Divider label */
  .time-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 8px 0;
    opacity: 0.4;
  }

  .time-divider span {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .time-divider::before,
  .time-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Responsive */
  @media (max-width: 600px) {
    .block-content { gap: 10px; padding: 12px 14px; }
    .block-time { min-width: 90px; font-size: 11px; }
    .stat { min-width: 80px; padding: 10px 12px; }
    .stat-value { font-size: 16px; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-eyebrow">NEET 2028 · AIIMS Target</div>
    <h1>Soham's Weekly Schedule</h1>
    <div class="header-sub">Built different. Grind different.</div>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab active" onclick="showDay('mon')">Mon</button>
    <button class="tab" onclick="showDay('tue')">Tue</button>
    <button class="tab" onclick="showDay('wed')">Wed</button>
    <button class="tab" onclick="showDay('thu')">Thu</button>
    <button class="tab" onclick="showDay('fri')">Fri</button>
    <button class="tab weekend" onclick="showDay('sat')">Sat</button>
    <button class="tab weekend" onclick="showDay('sun')">Sun</button>
  </div>

  <div class="stats" id="stats"></div>
  <div class="schedule" id="schedule"></div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--sleep)"></div> Sleep</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--coaching)"></div> Coaching</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--study)"></div> Self Study</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--gaming)"></div> Gaming</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--misc)"></div> Workout</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--reading)"></div> Reading</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--tuition)"></div> Maths Tuition</div>

</div>

<script>

      { time: '09:45 – 13:15', title: 'Study Block 1', desc: 'Big grind block — no distractions', icon: '🧬', cat: 'study', dur: '3h 30m' },
      { time: '13:15 – 14:15', title: 'Lunch + Rest', desc: 'Proper break, recharge', icon: '🍱', cat: 'food', dur: '1h' },
      { time: '14:15 – 17:45', title: 'Study Block 2', desc: 'Second big grind block', icon: '⚗️', cat: 'study', dur: '3h 30m' },
      { time: '17:45 – 18:30', title: 'Workout', desc: 'Home workout — abs, push, pull', icon: '💪', cat: 'workout', dur: '45m' },

      { time: '23:00 – 00:30', title: 'Gaming (Night)', desc: 'With the boys', icon: '🕹️', cat: 'gaming', dur: '1h 30m' },
      { time: '00:30 – 01:15', title: 'Reading', desc: 'Fiction wind down', icon: '📖', cat: 'reading', dur: '45m' },
      { time: '01:15 – 01:30', title: 'Wind Down', desc: 'Brush, prep for tomorrow', icon: '🌃', cat: 'misc', dur: '15m' },
    ]
  },
  thu: { label: 'Thursday', type: 'coaching', stats: { study: 4, gaming: 2.5, sleep: 7.5, coaching: 5 }, blocks: null },
  fri: { label: 'Friday', type: 'coaching', stats: { study: 4, gaming: 2.5, sleep: 7.5, coaching: 5 }, blocks: null },
  sat: {
    label: 'Saturday',
    type: 'offday',
    stats: { study: 7, gaming: 3, sleep: 7.5, coaching: 0 },
    blocks: [
      { time: '01:00 – 09:00', title: 'Sleep', desc: '8 hrs rest', icon: '🌙', cat: 'sleep', dur: '8h' },
      { time: '09:00 – 09:45', title: 'Morning Routine', desc: 'Freshen up, breakfast', icon: '☀️', cat: 'routine', dur: '45m' },

    label: 'Sunday',
    type: 'offday',

    blocks: [

      { time: '23:00 – 00:30', title: 'Gaming (Night)', desc: 'With the boys', icon: '🕹️', cat: 'gaming', dur: '1h 30m' },

// Copy coaching day blocks to tue, thu, fri
['tue', 'thu', 'fri'].forEach(d => {
  days[d].blocks = days['mon'].blocks;
});

let currentDay = 'mon';

function showDay(day) {
  currentDay = day;

  // Update tabs
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.remove('active');
  });
  event.target.classList.add('active');

  renderStats(day);
  renderSchedule(day);
}

function renderStats(day) {
  const d = days[day];
  const s = d.stats;
  const statsEl = document.getElementById('stats');

  const items = [
    { label: 'Study', value: s.study + 'h', color: 'var(--study)' },
    { label: 'Gaming', value: s.gaming + 'h', color: 'var(--gaming)' },
    { label: 'Sleep', value: s.sleep + 'h', color: 'var(--sleep)' },
  ];

  if (s.coaching) items.push({ label: 'Coaching', value: s.coaching + 'h', color: 'var(--coaching)' });
  if (s.tuition) items.push({ label: 'Tuition', value: s.tuition + 'h', color: 'var(--tuition)' });

  statsEl.innerHTML = items.map(item => `
    <div class="stat">
      <div class="stat-value" style="color:${item.color}">${item.value}</div>
      <div class="stat-label">${item.label}</div>
    </div>
  `).join('');
}

function renderSchedule(day) {
  const blocks = days[day].blocks;
  const schedEl = document.getElementById('schedule');

  schedEl.innerHTML = blocks.map(b => `
    <div class="block cat-${b.cat}">
      <div class="block-accent"></div>
      <div class="block-content">
        <div class="block-time">${b.time}</div>
        <div class="block-icon">${b.icon}</div>
        <div class="block-info">
          <div class="block-title">${b.title}</div>
          <div class="block-desc">${b.desc}</div>
        </div>
        <div class="block-duration">${b.dur}</div>
      </div>
    </div>
  `).join('');
}

// Init
renderStats('mon');
renderSchedule('mon');
</script>
</body>
</html>
